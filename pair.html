<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLTN-MD | Pairing Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0014;
            color: white;
        }
        .glass {
            background: rgba(157, 0, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(157, 0, 255, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(var(--primary-rgb), 0.5);
        }
        .input-glass {
            background: rgba(157, 0, 255, 0.05);
            border: 1px solid rgba(157, 0, 255, 0.2);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(157, 0, 255, 0.1);
        }
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #0a0014;
            overflow: hidden;
        }
        .bg-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.2;
            filter: blur(80px);
            pointer-events: none;
            animation: float 20s infinite alternate ease-in-out;
        }
        .bg-glow-2 {
            position: absolute;
            bottom: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(80px);
            pointer-events: none;
            animation: float 25s infinite alternate-reverse ease-in-out;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 15%) scale(1.1); }
            100% { transform: translate(-5%, -10%) scale(0.9); }
        }
        .savage-glow {
            text-shadow: 0 0 20px rgba(157, 0, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-animation">
        <div class="bg-glow" style="top: -10%; left: -10%;"></div>
        <div class="bg-glow-2"></div>
    </div>

    <div class="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-600/25 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-fuchsia-600/20 rounded-full blur-3xl"></div>

        <div class="relative z-10">
            <div class="w-20 h-20 rounded-3xl overflow-hidden flex items-center justify-center mx-auto mb-8 shadow-xl">
                <img id="page-logo" src="" alt="Logo" class="w-full h-full object-cover" referrerPolicy="no-referrer">
            </div>
            
            <h1 class="text-3xl font-bold mb-2 savage-glow" id="web-name">MLTN-MD ⛧</h1>
            <p class="text-gray-400 mb-10">Speak your number. The System will forge your code.</p>

            <div class="text-left mb-8">
                <label class="block text-sm font-semibold text-gray-400 mb-3 uppercase tracking-widest">Hunter's Number</label>
                <div class="relative">
                    <i class="fas fa-phone absolute left-5 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="tel" id="phoneNumber" placeholder="923001234567" class="input-glass w-full py-4 pl-14 pr-6 rounded-2xl text-lg font-medium">
                </div>
                <p class="text-[10px] text-gray-500 mt-3 px-2">Example: 923001234567 (No spaces or + sign)</p>
            </div>

            <button id="generateBtn" class="btn-primary w-full py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 shadow-lg">
                ⚔️ Forge the Code
            </button>

            <div id="result" class="mt-10 hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="p-6 rounded-3xl bg-purple-500/5 border border-purple-500/20">
                    <h3 class="text-purple-400 font-bold mb-4 flex items-center justify-center gap-2">
                        <i class="fas fa-check-circle"></i> The Code Has Awakened
                    </h3>
                    <div class="text-4xl font-mono font-bold tracking-[0.2em] text-white mb-6" id="codeText">---- ----</div>
                    <button id="copyBtn" class="w-full py-3 rounded-xl bg-white/10 hover:bg-white/20 transition-all font-semibold flex items-center justify-center gap-2">
                        <i class="fas fa-copy"></i> Copy Code
                    </button>
                </div>
                <p class="text-xs text-gray-500 mt-6 leading-relaxed">
                    Open WhatsApp > Settings > Linked Devices > Link with Phone Number instead.
                </p>
            </div>

            <a href="/" class="inline-block mt-10 text-sm font-medium text-gray-500 hover:text-white transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Back to the Gate
            </a>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phoneNumber');
        const generateBtn = document.getElementById('generateBtn');
        const resultDiv = document.getElementById('result');
        const codeText = document.getElementById('codeText');
        const copyBtn = document.getElementById('copyBtn');

        let currentCode = '';

        async function init() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                document.documentElement.style.setProperty('--primary', `#${config.primaryColor}`);
                document.documentElement.style.setProperty('--secondary', `#${config.secondaryColor}`);
                document.getElementById('web-name').textContent = config.webName;
                document.getElementById('page-logo').src = config.webLogoUrl;
                
                const hexToRgb = hex => {
                    const r = parseInt(hex.slice(0, 2), 16);
                    const g = parseInt(hex.slice(2, 4), 16);
                    const b = parseInt(hex.slice(4, 6), 16);
                    return `${r}, ${g}, ${b}`;
                };
                document.documentElement.style.setProperty('--primary-rgb', hexToRgb(config.primaryColor));
            } catch (error) {
                console.error('Failed to load config:', error);
            }
        }

        generateBtn.addEventListener('click', async () => {
            let phone = phoneInput.value.trim();
            if (!phone) return alert('Speak your number, Hunter.');
            
            phone = phone.replace(/[^0-9]/g, '');
            if (phone.length < 10) return alert('That number does not answer to the System.');

            generateBtn.disabled = true;
            generateBtn.innerHTML = '<div class="loader"></div> Forging...';
            resultDiv.classList.add('hidden');

            try {
                const response = await fetch(`/code?number=${phone}`);
                const data = await response.json();
                
                if (data.code) {
                    currentCode = data.code;
                    codeText.textContent = currentCode;
                    resultDiv.classList.remove('hidden');
                    generateBtn.innerHTML = '⚔️ Forge the Code';
                    generateBtn.disabled = false;
                } else {
                    throw new Error(data.error || 'The forge has failed');
                }
            } catch (error) {
                alert('Error: ' + error.message);
                generateBtn.innerHTML = '⚔️ Forge the Code';
                generateBtn.disabled = false;
            }
        });

        copyBtn.addEventListener('click', () => {
            if (currentCode) {
                navigator.clipboard.writeText(currentCode);
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 2000);
            }
        });

        init();
    </script>
</body>
</html>
